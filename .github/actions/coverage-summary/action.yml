name: Coverage Summary
description: Render cobertura coverage as a markdown section in the job summary. Skips silently when no coverage was produced (e.g. `nx affected` runs). Leaves code-coverage-results.md in the workspace for follow-up steps (PR comment).

runs:
  using: composite
  steps:
    # https://josh-ops.com/posts/github-code-coverage/
    - name: Code Coverage Summary Report
      if: ${{ hashFiles('packages/*/coverage/cobertura-coverage.xml') != '' }}
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: 'packages/*/coverage/cobertura-coverage.xml'
        badge: true
        format: 'markdown'
        output: 'both'

    - name: Write to Job Summary
      if: ${{ hashFiles('code-coverage-results.md') != '' }}
      run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY
      shell: bash
