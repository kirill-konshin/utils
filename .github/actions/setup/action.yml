name: Setup
description: Node.js + Corepack + Yarn install + Nx cache. The repo must already be checked out (a local action cannot run before checkout).

inputs:
  registry-url:
    description: npm registry URL — set only on jobs that publish (configures .npmrc auth)
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
        registry-url: ${{ inputs.registry-url }}
        cache: yarn
        cache-dependency-path: yarn.lock

    - name: Enable Corepack
      run: corepack enable
      shell: bash

    - name: Install dependencies
      run: yarn install --immutable
      shell: bash

    - name: Cache Nx
      uses: actions/cache@v6
      with:
        path: .nx/cache
        key: ${{ runner.os }}-nx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-nx-

