name: Release

on:
  push:
    branches:
      - main

  # Coordinated / forced release: bumps ALL packages with the given specifier
  workflow_dispatch:
    inputs:
      specifier:
        description: 'Version specifier for all packages: patch | minor | major | premajor | exact version (e.g. 1.0.0)'
        required: true
        type: string

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  verify:
    name: Verify & Preview
    runs-on: ubuntu-latest

    if: github.repository == 'kirill-konshin/utils'

    permissions:
      contents: read

    outputs:
      has_releases: ${{ steps.preview.outputs.has_releases }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Nx Release needs full history + tags to resolve current versions and conventional commits
          fetch-tags: true

      - name: Setup
        uses: ./.github/actions/setup

      # Skipped on `forced` pushes (e.g. a rebase): `before` may no longer be an ancestor of
      # `sha`, making the range invalid.
      - name: Validate commit messages
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000' && !github.event.forced
        run: yarn commitlint --from ${{ github.event.before }} --to ${{ github.sha }}

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test

      - name: Coverage Summary
        uses: ./.github/actions/coverage-summary

      - name: Release preview
        id: preview
        run: |
          set -o pipefail
          yarn release:preview ${{ inputs.specifier }} 2>&1 | sed -E 's/\x1B\[[0-9;]*[a-zA-Z]//g' | tee /tmp/preview.log
          echo "has_releases=$(grep -aq "releases/tag/" /tmp/preview.log && echo true || echo false)" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # still needs token to NOT create release, lol

      - name: Preview Summary
        run: |
          {
            echo "### 📦 Release preview"
            echo ""
            if [ "${{ steps.preview.outputs.has_releases }}" = "true" ]; then
              echo "Approve to publish the following:"
              echo ""
              echo '```'
              grep -aE "Resolved the specifier|New version .* written|releases/tag/|No changes were detected" /tmp/preview.log
              echo '```'
            else
              echo "Nothing to release — publish job skipped."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    name: Release
    runs-on: ubuntu-latest

    needs: verify
    if: needs.verify.outputs.has_releases == 'true'

    environment: npm-publish

    permissions:
      id-token: write # Required for OIDC trusted publishing
      contents: write # Required to push tags and create GitHub Releases

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Nx Release needs full history + tags to resolve current versions and conventional commits
          fetch-tags: true

      - name: Setup
        uses: ./.github/actions/setup
        with:
          registry-url: 'https://registry.npmjs.org' # publish job needs .npmrc auth config

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # preVersionCommand is build, physically not possible to release unbuilt.
      - name: Release
        run: |
          set -o pipefail
          yarn release ${{ inputs.specifier }} --yes 2>&1 | sed -E 's/\x1B\[[0-9;]*[a-zA-Z]//g' | tee /tmp/release.log
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Release Summary Report
        if: always()
        run: |
          {
            echo "### 📦 Release"
            echo ""
            if [ -f /tmp/release.log ]; then
              printf '```\n%s\n```\n' "$(cat /tmp/release.log)"
            else
              echo "Nothing was released."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
