name: Release

on:
  push:
    branches:
      - main
  # Coordinated / forced release: bumps ALL packages with the given specifier
  workflow_dispatch:
    inputs:
      specifier:
        description: 'Version specifier for all packages: patch | minor | major | premajor | exact version (e.g. 1.0.0)'
        required: true
        type: string

permissions:
  id-token: write # Required for OIDC
  contents: read

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    if: github.repository == 'kirill-konshin/utils'

    permissions:
      id-token: write # Required for OIDC trusted publishing
      contents: write # Required to push tags and create GitHub Releases

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Nx Release needs full history + tags to resolve current versions and conventional commits
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      # Skipped on `forced` pushes (e.g. a rebase): `before` may no longer be an ancestor of
      # `sha`, making the range invalid.
      - name: Validate commit messages
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000' && !github.event.forced
        run: yarn commitlint --from ${{ github.event.before }} --to ${{ github.sha }}

      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: ${{ runner.os }}-nx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nx-

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test

      # https://josh-ops.com/posts/github-code-coverage/
      - name: Code Coverage Summary Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: 'packages/*/coverage/cobertura-coverage.xml'
          badge: true
          format: 'markdown'
          output: 'both'

      - name: Write to Job Summary
        run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY

      - name: Build
        run: yarn build:packages

      - name: Configure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Push event: version determined per package from conventional commits since its last tag.
      # Manual dispatch: the provided specifier is applied to all packages (coordinated release).
      # Versions are written to package.json only in the CI working tree (never committed) —
      # source of truth for current versions is git tags.
      - name: Release
        run: yarn release ${{ inputs.specifier }} --yes 2>&1 | tee /tmp/release.log
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Release Summary Report
        if: always()
        run: |
          {
            echo "### 📦 Release"
            echo ""
            if [ -f /tmp/release.log ]; then
              printf '```\n%s\n```\n' "$(cat /tmp/release.log)"
            else
              echo "Nothing was released."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
