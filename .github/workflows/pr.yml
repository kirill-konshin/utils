name: PR Check

on:
  push:
    branches:
      - '**'
      - '!main'
  pull_request:
    branches:
      - '**'
      - '!main'

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  pr:
    name: PR Check
    runs-on: ubuntu-latest
    env:
      # Base for `nx affected` — full history is fetched below, so origin/main is always present
      NX_BASE: origin/main
      NX_HEAD: HEAD

    steps:
      # PRs are squash-merged with the PR title as the commit message, which Nx Release then parses as a conventional commit on main — so the title must be valid.
      - name: Validate PR title
        if: github.event_name == 'pull_request'
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test:affected

      - name: Coverage Summary
        uses: ./.github/actions/coverage-summary

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: ${{ github.event_name == 'pull_request' && hashFiles('code-coverage-results.md') != '' }}
        with:
          recreate: true
          path: code-coverage-results.md

      - name: Build
        run: yarn build:affected
