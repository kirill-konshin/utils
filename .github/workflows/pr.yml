name: PR Check

on:
  push:
    branches:
      - '**'
      - '!main'
  pull_request:
    branches:
      - '**'
      - '!main'

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  pr:
    name: PR Check
    runs-on: ubuntu-latest
    env:
      # Base for `nx affected` — full history is fetched below, so origin/main is always present
      NX_BASE: origin/main
      NX_HEAD: HEAD

    steps:
      # PRs are squash-merged with the PR title as the commit message, which Nx Release
      # then parses as a conventional commit on main — so the title must be valid.
      - name: Validate PR title
        if: github.event_name == 'pull_request'
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Cache Nx
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: ${{ runner.os }}-nx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nx-

      #      - name: Cache Next.js
      #        uses: actions/cache@v4
      #        with:
      #          path: |
      #            packages/.next/cache
      #          key: ${{ runner.os }}-next-${{ github.ref_name }}-${{ hashFiles('yarn.lock') }}-${{ hashFiles('packages/**/*.[jt]s', 'apps/web/**/*.[jt]sx', 'apps/web/**/*.json') }}
      #          restore-keys: |
      #            ${{ runner.os }}-next-${{ github.ref_name }}-${{ hashFiles('yarn.lock') }}-
      #            ${{ runner.os }}-next-main-${{ hashFiles('yarn.lock') }}-
      #            ${{ runner.os }}-next-

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test:affected

      # https://josh-ops.com/posts/github-code-coverage/
      # Guarded: with `nx affected` there may be no coverage output at all
      - name: Code Coverage Summary Report
        if: ${{ hashFiles('packages/*/coverage/cobertura-coverage.xml') != '' }}
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: 'packages/*/coverage/cobertura-coverage.xml'
          badge: true
          format: 'markdown'
          output: 'both'

      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: ${{ github.event_name == 'pull_request' && hashFiles('code-coverage-results.md') != '' }}
        with:
          recreate: true
          path: code-coverage-results.md

      - name: Write to Job Summary
        if: ${{ hashFiles('code-coverage-results.md') != '' }}
        run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY

      - name: Build
        run: yarn build:affected
